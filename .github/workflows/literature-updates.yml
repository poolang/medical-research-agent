name: Auto Literature Updates

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  update-literature:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests biopython
      - name: Run literature search
        env:
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: python scripts/literature-search.py
      - name: Commit and push updates
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update: weekly literature scan $(date +%Y-%m-%d)"
          git push
